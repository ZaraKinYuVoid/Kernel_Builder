name: Build Kernel
on:
  workflow_dispatch:
    inputs:
      BRANCH:
        description: Kernel branch
        default: 'android15-6.6'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: secureEnvironment
    steps:
    - uses: actions/checkout@v4
      with:
        path: kernel_root
        repository: ZaraKinYuVoid/kernel_motorola_sm6435
        ref: ${{ github.event.inputs.BRANCH }}
        show-progress: false

    - name: Prepare dependencies
      run: |
        sudo apt update && sudo apt install -y git device-tree-compiler lz4 xz-utils zlib1g-dev openjdk-17-jdk gcc g++ python3 python-is-python3 p7zip-full android-sdk-libsparse-utils erofs-utils \
            default-jdk git gnupg flex bison gperf build-essential zip curl libc6-dev jq libncurses-dev libx11-dev libreadline-dev libgl1 libgl1-mesa-dev \
            python3 make sudo gcc g++ bc grep tofrodos python3-markdown libxml2-utils xsltproc zlib1g-dev python-is-python3 libc6-dev libtinfo6 \
            make repo cpio kmod openssl libelf-dev pahole libssl-dev libarchive-tools zstd rsync --fix-missing && wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb && sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb
     
    - name: Build kernel
      id: buildKernel
      run: |
            mkdir toolchains
            cd toolchains
            URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/f60b8b55282f002f594f452ce22dfd6cf1fd7e3c/clang-r596125.tar.gz"
            echo "[+] Fetching Clang 22 ..."
            wget -q -O clang.tar.gz $URL
            tar -xf clang.tar.gz && rm clang.tar.gz && cd ..
            export PATH="$(pwd)/toolchains/bin:${PATH}"
            export TOOLCHAIN_PATH="$(pwd)/bin"
            export LD_LIBRARY_PATH="$(pwd)/lib:${LD_LIBRARY_PATH}"
            export BUILD_CC="$(pwd)/bin/clang"
            export O="${KERNEL_ROOT}/out"
            export ARCH=arm64
            export CROSS_COMPILE=aarch64-linux-gnu-
            export CLANG_TRIPLE=aarch64-linux-gnu-
            export CC="${BUILD_CC}"
            export LLVM=1
            export LLVM_IAS=1
            export AR="${TOOLCHAIN_PATH}/llvm-ar"
            export NM="${TOOLCHAIN_PATH}/llvm-nm"
            export LD="${TOOLCHAIN_PATH}/ld.lld"
            export STRIP="${TOOLCHAIN_PATH}/llvm-strip"
            export OBJCOPY="${TOOLCHAIN_PATH}/llvm-objcopy"
            export OBJDUMP="${TOOLCHAIN_PATH}/llvm-objdump"
            export READELF="${TOOLCHAIN_PATH}/llvm-readelf"
            export HOSTCC="${TOOLCHAIN_PATH}/clang"
            export HOSTCXX="${TOOLCHAIN_PATH}/clang++"
            make -C $(pwd) O=$(pwd)/out KCFLAGS=-w CONFIG_SECTION_MISMATCH_WARN_ONLY=y gki_defconfig vendor/parrot_perf.config vendor/ext_config/moto-parrot.config vendor/ext_config/moto-parrot-mumba.config
            make -C $(pwd) O=$(pwd)/out KCFLAGS=-w CONFIG_SECTION_MISMATCH_WARN_ONLY=y -j$(nproc --all)
            cd out/arch/arm64/boot
            wget https://github.com/Uevo001/magiskboot-linux/raw/refs/heads/main/x86_64/magiskboot
            wget https://gitlab.com/zarakinyu/android_dump_motorola_mumba/-/raw/W1WAA36.48-12-40/boot.img
            chmod +x magiskboot
            ./magiskboot unpack boot.img
            rm kernel
            mv Image kernel
            ./magiskboot repack boot.img
            wget -q https://raw.githubusercontent.com/kenway214/GoFile-Upload-Script/master/upload.sh -O ~/gofile && chmod +x ~/gofile
            echo 'alias gofile="~/gofile"' >> ~/.bashrc && source ~/.bashrc
            gofile new-boot.img
            
      working-directory: kernel_root
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Build
        path: |
          kernel_root/out/arch/arm64/boot/Image
